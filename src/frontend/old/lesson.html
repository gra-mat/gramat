<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../lib/pure.min.css"/>
    <title>Lekcja ⸱ Gramat</title>
    <link rel="icon" type="image/x-icon" href="../icons/logo.svg">
    <script type="module" src="../components/old/exercise-viewer.js"></script>
    <script type="module" src="../components/exercises/addsub-exercise.js"></script>
    <script type="module" src="../components/exercises/partial/success-mark.js"></script>
    <script type="module" src="../components/old/summary-viewer.js"></script>
    <script type="module" src="../components/exercises/fraction-exercise.js"></script>
    <script type="module" src="../components/exercises/calculate-area.js"></script>

    <style>
      html, body {
        height: 100%;
        width: 100%;
        background-color: #2c2c54;
        color: white;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <x-exercise-view>
      <x-addsub-exercise id="addsub-ex" style="display: none;"></x-addsub-exercise>
      <x-fraction-exercise id="fraction-ex" style="display: none;"></x-fraction-exercise>
      <x-calculate-area id="area-ex" style="display: none;"></x-calculate-area>
    </x-exercise-view>

    <summary-viewer
      id="summary"
      class="hidden"
      time="0m 37s"
      accuracy="100%"
      xp="+70 XP">
    </summary-viewer>

    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(location.search);
        const lessonId = params.get('lessonId');
        if (!lessonId) return;

        const r = await fetch(`/api/me/lessonQuestions/${lessonId}`);
        if (!r.ok) return;
        const data = await r.json();

        const exercises = data.exercises || [];
        if (!exercises.length) return;

        const view = document.querySelector('x-exercise-view');
        const addSub = document.querySelector('x-addsub-exercise');
        const fraction = document.querySelector('x-fraction-exercise');
        const area = document.querySelector('x-calculate-area');

        let startTime = Date.now();
        let correctAnswers = 0;
        let wrongAnswers = 0;

        view && view.setAttribute('progress-step', String(100 / exercises.length));

        let idx = 0;

        const getComponentForExercise = (exercise) => {
          try {
            const props = JSON.parse(exercise.exerciseProperties || '{}');
            const qt = props.question_type;
            const at = props.answer_type;
            if (qt === 'calculate_area_square') {
              return area;
            }
            if (at === 'selector' || at === 'multiplechoice' || at === 'matching' ||
                (at === 'keypad' && exercise.exerciseAnswer && exercise.exerciseAnswer.includes("/"))) {
              return fraction;
            }
            return addSub;
          } catch {
            return addSub;
          }
        };

        function showExercise(idx) {
          const current = exercises[idx];
          if (!current) return;

          let props;
          try { props = current.exerciseProperties ? JSON.parse(current.exerciseProperties) : {}; }
          catch { props = {}; }

          if (Array.isArray(props.options) && props.options.length) {
            if (!props.answer_type || !['multiplechoice','selector','matching'].includes(props.answer_type)) {
              props.answer_type = 'multiplechoice';
            }
          }

          const isFractionType = props.answer_type === 'selector' ||
            props.answer_type === 'multiplechoice' ||
            props.answer_type === 'matching' ||
            (props.answer_type === 'keypad' && current.exerciseAnswer && current.exerciseAnswer.includes("/"));

          if (props.question_type === 'calculate_area_square') {
            fraction.style.display = 'none';
            addSub.style.display = 'none';
            area.style.display = 'block';

            area.exerciseId = current.id;
            area.exercise = current.exerciseQuestion || '';
            area.solution = current.exerciseAnswer || '';
            area.difficultyId = current.difficultyId || null;
            area.square_side_length = props.side_length;
            area.config = props || { answer_type: 'keypad' };
            if (area.config.answer_type === 'slider' && area.config.answer_length) {
              const digits = parseInt(area.config.answer_length);
              if (digits != 1) {
                area.sliderMin = Math.pow(10, digits - 1); 
                area.sliderMax = Math.pow(10, digits); 
              } else {
                area.sliderMin = 0; 
                area.sliderMax = 10; 
              }
              area.given = Math.floor(Math.pow(10, digits) / 2).toString();
            }
            area.orderStage = 1;
            area.orderError = null;
            area.orderOperations = [];
            area.selectedOpIndex = null;
            area.resultOptions = [];
            area.selectedResult = null;
            area.dispatchEvent(new CustomEvent('exercise-loaded', { bubbles: true, composed: true }));
          }
          else if (isFractionType) {
            fraction.style.display = 'block';
            addSub.style.display = 'none';
            area.style.display = 'none';

            fraction.exerciseId = current.id;
            fraction.exercise = current.exerciseQuestion || '';
            fraction.config = props || { answer_type: 'keypad' };

            const parts = (current.exerciseAnswer || '').toString().split('/');
            fraction.solution = { numerator: parts[0] || '', denominator: parts[1] || '' };
            fraction.difficultyId = current.difficultyId || null;
            

            if (typeof current.exerciseAnswer === 'string' && current.exerciseAnswer.includes(',')) {
              fraction._expectedAnswers = current.exerciseAnswer.split(',').map(s => s.trim());
            } else {
              fraction._expectedAnswers = null;
            }

            if (Array.isArray(props.options) && props.options.length) {
              fraction.options = props.options;
              fraction.given = { numerator: props.options[0].numerator, denominator: props.options[0].denominator };
            } else {
              fraction.options = [];
              fraction.given = { numerator: '', denominator: '' };
            }

            fraction.statuses = ["", ""];
            fraction.dispatchEvent(new CustomEvent('exercise-loaded', { bubbles: true, composed: true }));
          } else {
            fraction.style.display = 'none';
            addSub.style.display = 'block';
            area.style.display = 'none';

            addSub.exercise = current.exerciseQuestion || '';
            addSub.solution = current.exerciseAnswer || '';
            addSub.difficultyId = current.difficultyId || null;
            addSub.config = props || { answer_type: 'keypad' };
            if (addSub.config.answer_type === 'slider' && addSub.config.answer_length) {
              const digits = parseInt(addSub.config.answer_length);
              if (digits != 1) {
                addSub.sliderMin = Math.pow(10, digits - 1); 
                addSub.sliderMax = Math.pow(10, digits); 
              } else {
                addSub.sliderMin = 0; 
                addSub.sliderMax = 10; 
              }
              addSub.given = Math.floor(Math.pow(10, addSub.config.answer_length) / 2).toString();
            }
            addSub.orderStage = 1;
            addSub.orderError = null;
            addSub.orderOperations = [];
            addSub.selectedOpIndex = null;
            addSub.resultOptions = [];
            addSub.selectedResult = null;

            if (addSub.config.answer_type === 'order') {
              addSub._prepareOrderExercise();
            }

            addSub.exerciseId = current.id;
            addSub.dispatchEvent(new CustomEvent('exercise-loaded', { bubbles: true, composed: true }));
          }
        }

        const updateTimer = () => {
          const elapsedTime = Date.now() - startTime;
          const minutes = Math.floor(elapsedTime / 1000 / 60);
          const seconds = Math.floor((elapsedTime / 1000) % 60);

          const timerElement = document.getElementById("timer");
          if (timerElement) {
            timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;
          }
        };

        const timerInterval = setInterval(updateTimer, 1000);

        showExercise(0);

        view.addEventListener("next-exercise", async () => {
          const component = getComponentForExercise(exercises[idx]);
          const wasCorrect = !!component.isCorrect;
          if (wasCorrect) correctAnswers++;
          else wrongAnswers++;

          idx++;

          if (idx >= exercises.length) {
            const summary = document.querySelector("#summary");
            if (!summary) return;

            document.querySelector("x-exercise-view").classList.add("hidden");

            const elapsedTime = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = elapsedTime % 60;

            const total = exercises.length;
            const accuracy = Math.round((correctAnswers / total) * 100);
            const xp = (correctAnswers * 10).toFixed(0);

            summary.setAttribute("time", `${minutes}m ${seconds}s`);
            summary.setAttribute("accuracy", `${accuracy}%`);
            summary.setAttribute("xp", `+${xp} XP`);
            summary.classList.remove("hidden");

            clearInterval(timerInterval);

            await fetch("/api/me/lessonCompleted", {
              method: "POST",
              credentials: "include",
              body: JSON.stringify({
                lessonId: lessonId,
                time: elapsedTime,
                accuracy: accuracy,
                xp: Number(xp)
              }),
              headers: {
                "Content-type": "application/json; charset=UTF-8"
              }
            });

            return;
          }

          setTimeout(() => {
            showExercise(idx);
          }, 350);
        });
      });
    </script>
  </body>
</html>
